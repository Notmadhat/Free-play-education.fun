<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Documentation | JS-Logic</title>
    <link rel="stylesheet" href="system-styles.css">
</head>
<body>

    <div style="display: flex; height: 100vh; font-family: sans-serif;">
        <!-- SIDEBAR -->
        <aside style="width: 250px; background: #161b22; color: white; padding: 20px;">
            <h2>JS-Logic</h2>
            <nav>
                <p style="color: grey; font-size: 12px;">DOCS</p>
                <a href="javascript:void(0)" onclick="showArticle('intro')" style="color: white; display: block; padding: 10px 0;">Introduction</a>
                <a href="javascript:void(0)" onclick="showArticle('api')" style="color: white; display: block; padding: 10px 0;">API Endpoints</a>
                
                <p style="color: grey; font-size: 12px; margin-top: 20px;">TOOLS</p>
                <a href="javascript:void(0)" onclick="showEditor()" style="color: #58a6ff; display: block; font-weight: bold;">💻 Script Editor</a>
            </nav>
        </aside>

        <!-- CONTENT -->
        <main style="flex: 1; padding: 40px; background: #0d1117; color: white;">
            
            <section id="article-view">
                <div id="article-content">
                    <h1>Introduction</h1>
                    <p>Select a topic from the sidebar.</p>
                </div>
            </section>

            <section id="editor-view" style="display: none;">
                <div style="display: flex; border: 1px solid #333; height: 400px;">
                    <div id="editor-files" style="width: 200px; border-right: 1px solid #333; background: #010409;"></div>
                    <div style="flex: 1; display: flex; flex-direction: column;">
                        <div style="padding: 10px; background: #161b22; display: flex; justify-content: space-between;">
                            <span id="current-filename">Select a file...</span>
                            <button id="test-btn" style="display: none; background: #2ea44f; color: white; border: none; padding: 5px 10px; cursor: pointer;">▶ Run Test</button>
                        </div>
                        <pre id="code-display" style="padding: 20px; color: #79c0ff;">// Source will appear here</pre>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- PLAYER -->
    <div id="player-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999;">
        <div style="background: #161b22; padding: 10px; color: white;">
            <button onclick="closeModule()" style="background: #d73a49; color: white; border: none; padding: 5px 10px; cursor: pointer;">✖ Close</button>
        </div>
        <iframe id="game-frame" style="width: 100%; height: calc(100% - 45px); border: none;"></iframe>
    </div>

    <script src="app-logic.js"></script>
</body>
</html>
