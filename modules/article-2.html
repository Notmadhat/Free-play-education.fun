<!DOCTYPE html>
<html>
<head>
    <title>Logic Module 2048</title>
    <style>
        body { background: #faf8ef; color: #776e65; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .grid { width: 300px; height: 300px; background: #bbada0; padding: 10px; border-radius: 6px; display: grid; grid-template-columns: repeat(4, 1fr); grid-gap: 10px; }
        .cell { width: 65px; height: 65px; background: rgba(238, 228, 218, 0.35); border-radius: 3px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; }
        .t2 { background: #eee4da; } .t4 { background: #ede0c8; } .t8 { background: #f2b179; color: #f9f6f2; }
        .t16 { background: #f59563; color: #f9f6f2; } .t32 { background: #f67c5f; color: #f9f6f2; }
        .t64 { background: #f65e3b; color: #f9f6f2; } .t128 { background: #edcf72; color: #f9f6f2; font-size: 20px; }
    </style>
</head>
<body>
    <h2 style="margin-bottom: 10px;">Score: <span id="score">0</span></h2>
    <div class="grid" id="grid"></div>

    <script>
        let board = Array(16).fill(0);
        let score = 0;

        function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                let div = document.createElement('div');
                div.className = 'cell';
                grid.appendChild(div);
            }
            addTile(); addTile(); render();
        }

        function render() {
            const cells = document.querySelectorAll('.cell');
            board.forEach((val, i) => {
                cells[i].innerText = val === 0 ? '' : val;
                cells[i].className = 'cell' + (val ? ' t' + val : '');
            });
            document.getElementById('score').innerText = score;
        }

        function addTile() {
            let empty = board.map((v, i) => v === 0 ? i : null).filter(v => v !== null);
            if (empty.length) board[empty[Math.floor(Math.random() * empty.length)]] = Math.random() < 0.9 ? 2 : 4;
        }

        function slide(row) {
            let arr = row.filter(v => v);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) { arr[i] *= 2; score += arr[i]; arr[i + 1] = 0; }
            }
            arr = arr.filter(v => v);
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function move(dir) {
            let oldBoard = [...board];
            for (let i = 0; i < 4; i++) {
                let row = [], indices = [];
                for (let j = 0; j < 4; j++) {
                    let idx = (dir === 'left' || dir === 'right') ? (i * 4 + j) : (j * 4 + i);
                    row.push(board[idx]); indices.push(idx);
                }
                if (dir === 'right' || dir === 'down') row.reverse();
                row = slide(row);
                if (dir === 'right' || dir === 'down') row.reverse();
                row.forEach((v, j) => board[indices[j]] = v);
            }
            if (JSON.stringify(oldBoard) !== JSON.stringify(board)) { addTile(); render(); }
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft' || e.key === 'a') move('left');
            if (e.key === 'ArrowRight' || e.key === 'd') move('right');
            if (e.key === 'ArrowUp' || e.key === 'w') move('up');
            if (e.key === 'ArrowDown' || e.key === 's') move('down');
        });

        init();
    </script>
</body>
</html>
