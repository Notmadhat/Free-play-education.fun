<!DOCTYPE html>
<html>
<head>
    <title>Logic Module - S</title>
    <style>
        body { background: #0d1117; color: #2ea44f; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        canvas { border: 2px solid #30363d; background: #000; box-shadow: 0 0 20px rgba(46, 164, 79, 0.2); }
        .stats { margin-bottom: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="stats">Processing Latency: <span id="score">0</span>ms</div>
    <canvas id="game" width="400" height="400"></canvas>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        let box = 20; let score = 0;
        let snake = [{x: 9 * box, y: 10 * box}];
        let food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
        let d;
        document.addEventListener("keydown", direction);
        function direction(event) {
            if(event.keyCode == 37 && d != "RIGHT") d = "LEFT";
            else if(event.keyCode == 38 && d != "DOWN") d = "UP";
            else if(event.keyCode == 39 && d != "LEFT") d = "RIGHT";
            else if(event.keyCode == 40 && d != "UP") d = "DOWN";
        }
        function draw() {
            ctx.fillStyle = "black"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#2ea44f" : "#161b22";
                ctx.strokeStyle = "#30363d";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }
            ctx.fillStyle = "#ff4444"; ctx.fillRect(food.x, food.y, box, box);
            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if( d == "LEFT") snakeX -= box; if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box; if( d == "DOWN") snakeY += box;
            if(snakeX == food.x && snakeY == food.y) {
                score++; scoreElement.innerHTML = score * 10;
                food = { x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box };
            } else { snake.pop(); }
            let newHead = { x: snakeX, y: snakeY };
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game); location.reload();
            }
            snake.unshift(newHead);
        }
        function collision(head, array) {
            for(let i = 0; i < array.length; i++) { if(head.x == array[i].x && head.y == array[i].y) return true; }
            return false;
        }
        let game = setInterval(draw, 100);
    </script>
</body>
</html>
